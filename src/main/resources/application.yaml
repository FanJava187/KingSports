spring:
  application:
    name: KingSports

  datasource:
    url: jdbc:mysql://localhost:3306/kingsports_db?serverTimezone=Asia/Taipei&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: YOUR_DB_PASSWORD # DO NOT COMMIT REAL PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
