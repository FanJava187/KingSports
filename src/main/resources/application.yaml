spring:
  application:
    name: KingSports

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kingsports_db?serverTimezone=Asia/Taipei&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
